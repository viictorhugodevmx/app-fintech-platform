<section class="trading-page">

  <div class="page-header">
    <h1>Trading Engine</h1>
    <p>Place buy and sell orders for BTC / USD</p>
  </div>

  <div class="trading-layout">

    <!-- PRICE PANEL -->

    <div class="price-panel">
      <span class="label">Current Price</span>
      <strong>$ 67,420</strong>
      <span class="positive">+2.14%</span>
    </div>

    <!-- BUY PANEL -->

    <div class="trade-panel buy">

      <h2>Buy BTC</h2>

      <label>
        Price
        <input type="number" placeholder="Enter price">
      </label>

      <label>
        Amount
        <input type="number" placeholder="Enter amount">
      </label>

      <label>
        Total
        <input type="number" placeholder="Auto calculated">
      </label>

      <button class="buy-btn" (click)="buy(67420, 0.1)">
        Place Buy Order
      </button>

    </div>

    <!-- SELL PANEL -->

    <div class="trade-panel sell">

      <h2>Sell BTC</h2>

      <label>
        Price
        <input type="number" placeholder="Enter price">
      </label>

      <label>
        Amount
        <input type="number" placeholder="Enter amount">
      </label>

      <label>
        Total
        <input type="number" placeholder="Auto calculated">
      </label>

      <button class="sell-btn" (click)="sell(67420, 0.1)">
        Place Sell Order
      </button>

    </div>

  </div>

</section>
