<section class="market-page">
  <div class="page-header">
    <div>
      <h1>Market Dashboard</h1>
      <p>Live overview of major crypto assets and market activity.</p>
    </div>

    <button class="refresh-btn">
      Refresh
    </button>
  </div>

  <div class="stats-grid">

    <app-stat-card
      label="BTC Price"
      [value]="'$ ' + market.price()"
      hint="Live price"
    />

    <app-stat-card
      label="ETH Price"
      value="$ 3,480"
      hint="+1.22%"
    />

    <app-stat-card
      label="24h Volume"
      value="$128B"
      hint="Market activity"
    />

    <app-stat-card
      label="Market Sentiment"
      value="Bullish"
      hint="Strong buying pressure"
    />

    <app-market-chart />
  </div>


  <div class="market-panel">
    <div class="panel-header">
      <h2>Top Assets</h2>
      <span>Updated just now</span>
    </div>

    <div class="market-table">
      <div class="table-head">
        <span>Asset</span>
        <span>Price</span>
        <span>Change</span>
        <span>Volume</span>
      </div>

      <div class="table-row">
        <span>BTC / USD</span>
        <span>$ 67,420</span>
        <span class="positive">+2.14%</span>
        <span>$ 38.2B</span>
      </div>

      <div class="table-row">
        <span>ETH / USD</span>
        <span>$ 3,480</span>
        <span class="positive">+1.22%</span>
        <span>$ 21.7B</span>
      </div>

      <div class="table-row">
        <span>SOL / USD</span>
        <span>$ 162</span>
        <span class="negative">-0.85%</span>
        <span>$ 6.4B</span>
      </div>

      <div class="table-row">
        <span>XRP / USD</span>
        <span>$ 0.61</span>
        <span class="positive">+0.48%</span>
        <span>$ 3.1B</span>
      </div>

      <div class="table-row">
        <span>ADA / USD</span>
        <span>$ 0.74</span>
        <span class="negative">-1.10%</span>
        <span>$ 1.9B</span>
      </div>
    </div>
  </div>
</section>
